<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoVerse Prime | Brand Selection Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');

        :root {
            --primary: #00e5ff; /* Cyan Electric Accent */
            --bg-main: #0a0b0d;
            --surface: #14161d;
            --surface-card: #1c1f2a;
            --text-main: #ffffff;
            --text-muted: #8e94a5;
            --tag-petrol: #ff9100;
            --tag-ev: #00e676;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* --- STICKY NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background: rgba(10, 11, 13, 0.95);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        .logo span {
            color: var(--primary);
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container input {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 15px 10px 40px;
            color: white;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 12px;
            color: var(--text-muted);
        }

        /* --- CONTROLS HEADER SECTION --- */
        .dashboard-header {
            margin-top: 120px;
            padding: 0 6%;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .dashboard-header p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* --- BRAND SELECTION COMPONENT --- */
        .brand-hub-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin: 0 6% 40px 6%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand-hub-card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .brand-node {
            background: var(--surface-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .brand-node i {
            font-size: 22px;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .brand-node span {
            font-size: 13px;
            font-weight: 600;
        }

        .brand-node:hover, .brand-node.active {
            border-color: var(--primary);
            background: rgba(0, 229, 255, 0.05);
            transform: scale(1.03);
        }

        .brand-node:hover i, .brand-node.active i {
            color: var(--primary);
        }

        /* Category Sub-Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 10px;
            border-radius: 40px;
            width: max-content;
            margin: 0 auto 40px auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: #000000;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        /* --- DYNAMIC BIKE GRID --- */
        .catalog-container {
            padding: 0 6%;
        }

        .bike-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Card Architecture */
        .bike-card {
            background: var(--surface-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bike-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            border-color: rgba(0, 229, 255, 0.2);
        }

        .card-visual-frame {
            height: 200px;
            position: relative;
            overflow: hidden;
            background: #1a1c23;
        }

        .card-visual-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .bike-card:hover .card-visual-frame img {
            transform: scale(1.08);
        }

        /* Labels / Badges */
        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 2;
        }

        .engine-type-tag {
            position: absolute;
            bottom: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            background: var(--tag-petrol);
            color: #000;
            z-index: 2;
        }

        .engine-type-tag.ev {
            background: var(--tag-ev);
        }

        /* Info Section */
        .card-details {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-details h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .brand-line {
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .specs-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .spec-node {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spec-node i {
            color: var(--primary);
            width: 14px;
            text-align: center;
        }

        .price-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 15px;
        }

        .price-lbl {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .price-val {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        /* --- DIALOG MODAL (DETAILS POPUP) --- */
        .info-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 7, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .info-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-body {
            background: var(--surface);
            width: 90%;
            max-width: 550px;
            border-radius: 20px;
            padding: 40px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        .modal-body h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .modal-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-top: 20px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-left: 3px solid var(--primary);
            border-radius: 4px;
        }
    </style>
</head>

            { id: 35, name: "Aerox 155 VVA", brand: "Yamaha", type: "petrol", category: "scooter", timeline: "Petrol Scooter", power: "15 HP", engine: "155 cc Liquid", rangeSpeed: "120 km/h", weight: "126 kg", price: "₹1,49,000", image: "https://images.unsplash.com/photo-1609630875171-b1321377ee65?auto=format&fit=crop&w=600&q=80", desc: "Pure motorcycle DNA forged directly into a step-through scooter layout featuring liquid-cooled variable valve actuation." }
        ];

        // System State Tracking Variable Nodes
        let currentSelectedBrand = "ALL";
        let currentSelectedType = "all";

        // Generate dynamic company selection items from the product database array
        function setupBrandSelector() {
            const grid = document.getElementById('brandGrid');
            
            // Extract and map all individual unique manufacturer names
            const brands = ["ALL", ...new Set(bikeDatabase.map(item => item.brand))];
            
            grid.innerHTML = "";
            brands.forEach(brand => {
                const totalModels = brand === "ALL" ? bikeDatabase.length : bikeDatabase.filter(item => item.brand === brand).length;
                const node = document.createElement('div');
                node.className = `brand-node ${brand === "ALL" ? "active" : ""}`;
                node.setAttribute('data-brand', brand);
                node.onclick = () => selectBrand(brand);
                
                // Map basic visual typography markers
                let iconClass = "fa-solid fa-motorcycle";
                if (brand === "ALL") iconClass = "fa-solid fa-border-all";
                else if (["Ola Electric", "Ather Energy", "Ultraviolette", "Revolt", "Tork Motors", "Matter Energy", "River", "SVM Motors"].includes(brand)) {
                    iconClass = "fa-solid fa-charging-station";
                }

                node.innerHTML = `
                    <i class="${iconClass}"></i>
                    <span>${brand}</span>
                    <small style="color: var(--text-muted); font-size:10px;">${totalModels} Models</small>
                `;
                grid.appendChild(node);
            });
        }

        // Action routing pipeline when user selects a specific manufacturer card node
        function selectBrand(brand) {
            currentSelectedBrand = brand;
            
            // Re-render structural visual node active frames
            document.querySelectorAll('.brand-node').forEach(node => {
                if(node.getAttribute('data-brand') === brand) node.classList.add('active');
                else node.classList.remove('active');
            });

            filterData();
        }

        // Action routing pipeline when user switches vehicle configurations
        function filterType(categoryType) {
            currentSelectedType = categoryType;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.getAttribute('data-type') === categoryType) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            filterData();
        }

        // Combined data compilation matrix filtering by Brand, Category Type, and Text Query inputs
        function filterData() {
            const searchQuery = document.getElementById('searchField').value.toLowerCase();

            const compiledOutput = bikeDatabase.filter(item => {
                const matchBrand = (currentSelectedBrand === "ALL") || (item.brand === currentSelectedBrand);
                const matchType = (currentSelectedType === "all") || (item.category === currentSelectedType);
                const matchText = item.name.toLowerCase().includes(searchQuery) || item.brand.toLowerCase().includes(searchQuery);

                return matchBrand && matchType && matchText;
            });

            renderGrid(compiledOutput);
        }

        // Layout compiler mapping array values onto the catalog viewport layout grid
        function renderGrid(items) {
            const container = document.getElementById('catalogGrid');
            container.innerHTML = ""; 

            if (items.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No vehicles match the selected criteria.</p>`;
                return;
            }

            items.forEach(bike => {
                const isEv = bike.type === 'ev';
                const card = document.createElement('div');
                card.className = "bike-card";
                card.innerHTML = `
                    <div class="card-visual-frame">
                        <span class="status-badge">${bike.timeline}</span>
                        <span class="engine-type-tag ${isEv ? 'ev' : ''}">${bike.type.toUpperCase()}</span>
                        <img src="${bike.image}" alt="${bike.name}" loading="lazy">
                    </div>
                    <div class="card-details">
                        <span class="brand-line">${bike.brand}</span>
                        <h3>${bike.name}</h3>
                        <div class="specs-table">
                            <div class="spec-node"><i class="fa-solid fa-bolt"></i> ${bike.power}</div>
                            <div class="spec-node"><i class="fa-solid fa-microchip"></i> ${bike.engine}</div>
                            <div class="spec-node"><i class="fa-solid fa-gauge-high"></i> ${bike.rangeSpeed}</div>
                            <div class="spec-node"><i class="fa-solid fa-weight-hanging"></i> ${bike.weight}</div>
                        </div>
                        <div class="price-row">
                            <div>
                                <div class="price-lbl">Estimated Price</div>
                                <div class="price-val">${bike.price}</div>
                            </div>
                            <button class="tab-btn" style="padding: 6px 16px; font-size:11px;" onclick="viewFullSpecs(${bike.id})">Specs</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Detailed overlay dialog viewer activation routine
        function viewFullSpecs(id) {
            const bike = bikeDatabase.find(b => b.id === id);
            if(!bike) return;

            document.getElementById('modalBrand').innerText = bike.brand;
            document.getElementById('modalTitle').innerText = bike.name;
            document.getElementById('modalDesc').innerText = bike.desc;

            document.getElementById('modalSpecs').innerHTML = `
                <div class="spec-node"><i class="fa-solid fa-bolt"></i> <strong>Power Output:</strong> ${bike.power}</div>
                <div class="spec-node"><i class="fa-solid fa-gears"></i> <strong>Engine/Battery:</strong> ${bike.engine}</div>
                <div class="spec-node"><i class="fa-solid fa-gauge-high"></i> <strong>Top Speed/Range:</strong> ${bike.rangeSpeed}</div>
                <div class="spec-node"><i class="fa-solid fa-weight-hanging"></i> <strong>Kerb Weight:</strong> ${bike.weight}</div>
                <div class="spec-node"><i class="fa-solid fa-indian-rupee-sign"></i> <strong>Ex-Showroom:</strong> ${bike.price}</div>
                <div class="spec-node"><i class="fa-solid fa-tags"></i> <strong>Segment Type:</strong> ${bike.timeline}</div>
            `;

            document.getElementById('specModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('specModal').classList.remove('active');
        }

        // Initialization Pipeline Routine calls
        setupBrandSelector();
        renderGrid(bikeDatabase);
    </script>
